name: Daily Weather Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM CDT (UTC-5) / 7:00 AM CST (UTC-6)
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_HOST:        ${{ secrets.DB_HOST }}
      DB_PORT:        ${{ secrets.DB_PORT }}
      DB_NAME:        ${{ secrets.DB_NAME }}
      DB_USER:        ${{ secrets.DB_USER }}
      DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE:     require
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Run ingest_observations
        id: obs
        run: python scripts/ingest_observations.py

      - name: Run ingest_forecasts
        id: fcst
        run: python scripts/ingest_forecasts.py

      - name: Run verify_forecasts
        id: verify
        run: python scripts/verify_forecasts.py

      - name: Send Discord notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993
          ICON="✅"
          if [ "$STATUS" != "success" ]; then
            COLOR=15158332
            ICON="❌"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"WeatherBetter\",
              \"embeds\": [{
                \"title\": \"$ICON Daily Pipeline $STATUS\",
                \"color\": $COLOR,
                \"description\": \"Run completed on $(date -u '+%Y-%m-%d at %H:%M UTC')\",
                \"fields\": [
                  {\"name\": \"Observations\", \"value\": \"${{ steps.obs.outcome || 'ran' }}\", \"inline\": true},
                  {\"name\": \"Forecasts\", \"value\": \"${{ steps.fcst.outcome || 'ran' }}\", \"inline\": true},
                  {\"name\": \"Verification\", \"value\": \"${{ steps.verify.outcome || 'ran' }}\", \"inline\": true}
                ]
              }]
            }"
